name: APK Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install p7zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Extract 7z Archive
        run: |
          # 假设压缩包名为 source.7z，若不是请修改
          7z x source.7z -o. -y
          echo "=== 解压后的目录结构 ==="
          ls -la

      - name: Find Android Project Root
        id: find_project
        run: |
          PROJECT_DIR=$(find . -maxdepth 3 -type f \( -name "settings.gradle" -o -name "settings.gradle.kts" -o -name "build.gradle" -o -name "build.gradle.kts" \) -printf "%h\n" | head -1)
          if [ -z "$PROJECT_DIR" ]; then
            echo "❌ 未找到 Gradle 项目目录！"
            exit 1
          fi
          echo "✅ 项目目录: $PROJECT_DIR"
          echo "project_dir=$PROJECT_DIR" >> $GITHUB_OUTPUT

      - name: Apply Kotlin source patches (自动修复已知错误)
        run: |
          PROJECT_DIR="${{ steps.find_project.outputs.project_dir }}"
          TARGET="$PROJECT_DIR/app/src/main/java/io/legado/app/ui/book/source/manage/BookSourceActivity.kt"
          
          echo "正在修复 $TARGET"
          
          # 1. 修复 alert 调用：titleResource → title
          sed -i 's/alert(titleResource = "深度校验", messageResource = "将检测章节内容是否为拼接\/抄袭小说\\n此过程可能需要较长时间")/alert(title = "深度校验", message = "将检测章节内容是否为拼接\/抄袭小说\\n此过程可能需要较长时间")/' "$TARGET"
          
          # 2. 修复 applyTint 颜色问题（如果 primaryTextColor 是 String）
          #    检查是否已存在 Color.parseColor，若无则替换
          if ! grep -q "Color.parseColor" "$TARGET"; then
            sed -i '/searchView.applyTint(primaryTextColor)/c\        val colorInt = try { Color.parseColor(primaryTextColor) } catch (e: IllegalArgumentException) { primaryColor }\n        searchView.applyTint(colorInt)' "$TARGET"
            # 确保 import android.graphics.Color 存在
            if ! grep -q "import android.graphics.Color" "$TARGET"; then
              sed -i '/^import android.graphics.Color/d' "$TARGET"
              sed -i '1,/^import/ s/^import/import android.graphics.Color\nimport/' "$TARGET"
            fi
          fi
          
          echo "修复完成。显示修改后的相关行："
          grep -n -A2 -B2 "深度校验" "$TARGET" || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build With Gradle
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleAppDebug --build-cache --parallel --warning-mode all -x lint
          else
            gradle assembleAppDebug --build-cache --parallel --warning-mode all -x lint
          fi

      - name: Organize the Files
        run: |
          mkdir -p ${{ github.workspace }}/apk/
          find ${{ steps.find_project.outputs.project_dir }} -type f -path "*/build/outputs/apk/*" -name "*.apk" -exec cp {} ${{ github.workspace }}/apk/ \;
          echo "APK files copied:"
          ls -l ${{ github.workspace }}/apk/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Legado-Debug-APK
          path: ${{ github.workspace }}/apk/*.apk
