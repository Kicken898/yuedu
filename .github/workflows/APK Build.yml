name: APK Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install p7zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Extract 7z Archive
        run: |
          # 假设压缩包名为 source.7z，如果不是请修改
          7z x source.7z -o. -y
          echo "=== 解压后根目录内容 ==="
          ls -la

      - name: Debug - List all settings.gradle files
        run: |
          echo "=== 查找所有 settings.gradle 文件 ==="
          find . -name "settings.gradle" -o -name "settings.gradle.kts" | head -20

      - name: Find Android Project Root
        id: find_project
        run: |
          # 查找包含 settings.gradle 的目录，优先选择路径中包含 "legado" 的
          PROJECT_DIR=$(find . -type f -name "settings.gradle" -printf "%h\n" | grep -i "legado" | head -1)
          if [ -z "$PROJECT_DIR" ]; then
            PROJECT_DIR=$(find . -type f -name "settings.gradle" -printf "%h\n" | head -1)
          fi
          if [ -z "$PROJECT_DIR" ]; then
            echo "❌ 未找到 settings.gradle 文件"
            exit 1
          fi
          echo "✅ 确定的项目根目录: $PROJECT_DIR"
          echo "project_dir=$PROJECT_DIR" >> $GITHUB_OUTPUT

      - name: Debug - Show project directory structure
        run: |
          PROJECT_DIR="${{ steps.find_project.outputs.project_dir }}"
          echo "=== 项目根目录内容 ==="
          ls -la "$PROJECT_DIR"
          echo "=== app 模块是否存在 ==="
          ls -la "$PROJECT_DIR/app" || echo "app 目录不存在"

      - name: Apply Source Patches (修复编译错误)
        run: |
          PROJECT_DIR="${{ steps.find_project.outputs.project_dir }}"
          TARGET="$PROJECT_DIR/app/src/main/java/io/legado/app/ui/book/source/manage/BookSourceActivity.kt"
          
          echo "目标修复文件: $TARGET"
          
          # 如果文件不存在，尝试其他可能的路径
          if [ ! -f "$TARGET" ]; then
            echo "⚠️ 标准路径下未找到文件，尝试查找 BookSourceActivity.kt..."
            TARGET=$(find "$PROJECT_DIR" -name "BookSourceActivity.kt" | head -1)
            if [ -z "$TARGET" ]; then
              echo "❌ 未找到 BookSourceActivity.kt，跳过修复"
              exit 0
            fi
            echo "找到文件: $TARGET"
          fi
          
          # 备份原文件以便调试
          cp "$TARGET" "$TARGET.bak"
          
          # 1. 修复 alert 调用：titleResource → title
          sed -i 's/alert(titleResource = "深度校验", messageResource = "将检测章节内容是否为拼接\/抄袭小说\\n此过程可能需要较长时间")/alert(title = "深度校验", message = "将检测章节内容是否为拼接\/抄袭小说\\n此过程可能需要较长时间")/g' "$TARGET"
          
          # 2. 修复 applyTint 颜色问题
          if ! grep -q "Color.parseColor(primaryTextColor)" "$TARGET"; then
            sed -i 's/searchView\.applyTint(primaryTextColor)/val colorInt = try { Color.parseColor(primaryTextColor) } catch (e: IllegalArgumentException) { primaryColor }\n        searchView.applyTint(colorInt)/g' "$TARGET"
            if ! grep -q "import android.graphics.Color" "$TARGET"; then
              sed -i '/^import android\./i import android.graphics.Color' "$TARGET"
            fi
          fi
          
          echo "修复完成。文件差异如下："
          diff -u "$TARGET.bak" "$TARGET" || true

      - name: Debug - Show actual code around line 290-300
        run: |
          PROJECT_DIR="${{ steps.find_project.outputs.project_dir }}"
          TARGET="$PROJECT_DIR/app/src/main/java/io/legado/app/ui/book/source/manage/BookSourceActivity.kt"
          if [ ! -f "$TARGET" ]; then
            TARGET=$(find "$PROJECT_DIR" -name "BookSourceActivity.kt" | head -1)
          fi
          echo "=== 实际编译文件: $TARGET ==="
          echo "=== 第 290-305 行内容 ==="
          sed -n '290,305p' "$TARGET"
          echo "=== 检查是否还包含 titleResource = \"深度校验\" ==="
          grep -n "titleResource.*深度校验" "$TARGET" || echo "✅ 未找到，修复成功"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build With Gradle
        working-directory: ${{ steps.find_project.outputs.project_dir }}
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleAppDebug --build-cache --parallel --warning-mode all -x lint
          else
            gradle assembleAppDebug --build-cache --parallel --warning-mode all -x lint
          fi

      - name: Collect APK files
        run: |
          mkdir -p ${{ github.workspace }}/apk/
          find ${{ steps.find_project.outputs.project_dir }} -type f -path "*/build/outputs/apk/*" -name "*.apk" -exec cp {} ${{ github.workspace }}/apk/ \;
          echo "APK files collected:"
          ls -l ${{ github.workspace }}/apk/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Legado-Debug-APK
          path: ${{ github.workspace }}/apk/*.apk
