name: APK Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install p7zip
        run: sudo apt-get update && sudo apt-get install -y p7zip-full

      - name: Extract 7z Archive
        run: |
          7z x source.7z -o. -y
          echo "Extraction done."

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK
        run: |
          cd legado-ready
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleAppDebug --build-cache --parallel --warning-mode all -x lint
          else
            gradle assembleAppDebug --build-cache --parallel --warning-mode all -x lint
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Legado-Debug-APK
          path: legado-ready/app/build/outputs/apk/**/*.apk
